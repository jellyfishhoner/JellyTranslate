<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0e1016">
    <meta name="description" content="Choose JellyTranslate for macOS or Windows.">
    <meta property="og:title" content="JellyTranslate">
    <meta property="og:description" content="A qTranslate-style translator for macOS, with a Windows preview in progress.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/jellytranslate-icon.webp">
    <title>JellyTranslate</title>
    <link rel="icon" href="/assets/jellytranslate-icon.webp">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="platform-page">
    <a class="maker-badge" href="https://t.me/jjellyfishhoner" target="_blank" rel="noopener noreferrer" aria-label="Open JellyfishHoner on Telegram">
      <svg class="telegram-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21.6 4.2 18.4 19c-.2 1-.8 1.2-1.6.8l-4.9-3.6-2.4 2.3c-.3.3-.5.5-1 .5l.4-5 9.1-8.2c.4-.4-.1-.6-.6-.3L6.1 12.6 1.3 11.1c-1-.3-1-1 .2-1.5L20.1 2.4c.9-.3 1.7.2 1.5 1.8Z"/>
      </svg>
      <span>by JellyfishHoner</span>
    </a>

    <main class="platform-gateway" aria-labelledby="platform-title">
      <div class="gateway-brand">
        <img src="/assets/jellytranslate-icon.webp" alt="" class="gateway-icon">
        <span>JellyTranslate</span>
      </div>

      <section class="gateway-hero">
        <h1 id="platform-title">Choose your platform</h1>
        <p>Translate and replace selected text.</p>
      </section>

      <section class="platform-options" aria-label="Platform options">
        <a class="platform-choice cursor-glow-panel" href="/mac.html" aria-label="Open JellyTranslate for Mac">
          <span class="platform-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M17.2 12.7c0-2.6 2.1-3.8 2.2-3.9-1.2-1.8-3.1-2-3.8-2-1.6-.2-3.1 1-3.9 1-.8 0-2-.9-3.3-.9-1.7 0-3.3 1-4.2 2.5-1.8 3.1-.5 7.8 1.3 10.3.9 1.2 1.9 2.6 3.2 2.5 1.3-.1 1.8-.8 3.4-.8 1.6 0 2 .8 3.4.8 1.4 0 2.3-1.3 3.1-2.5 1-1.4 1.4-2.8 1.4-2.9 0 0-2.8-1.1-2.8-4.1ZM14.6 5.1c.7-.9 1.2-2.1 1.1-3.3-1.1 0-2.4.7-3.1 1.6-.7.8-1.3 2-1.1 3.2 1.2.1 2.4-.6 3.1-1.5Z"/>
            </svg>
          </span>
          <span>Mac</span>
        </a>

        <a class="platform-choice cursor-glow-panel" href="/windows.html" aria-label="Open JellyTranslate for Windows">
          <span class="platform-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M2.2 4.1 11 2.9v8.4H2.2V4.1Zm9.8-1.4 9.8-1.4v10H12V2.7ZM2.2 12.4H11v8.7l-8.8-1.2v-7.5Zm9.8 0h9.8v10.3L12 21.3v-8.9Z"/>
            </svg>
          </span>
          <span>Windows</span>
        </a>
      </section>
    </main>

    <script>
      document.querySelectorAll(".cursor-glow-panel").forEach((panel) => {
        panel.addEventListener("pointermove", (event) => {
          const rect = panel.getBoundingClientRect();
          const x = ((event.clientX - rect.left) / rect.width) * 100;
          const y = ((event.clientY - rect.top) / rect.height) * 100;
          panel.style.setProperty("--glow-x", `${x}%`);
          panel.style.setProperty("--glow-y", `${y}%`);
        });
      });
    </script>
  </body>
</html>
