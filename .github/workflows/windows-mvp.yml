name: Windows MVP Build

on:
  push:
    paths:
      - "JellyTranslate.Windows/**"
      - ".github/workflows/windows-mvp.yml"
  pull_request:
    paths:
      - "JellyTranslate.Windows/**"
      - ".github/workflows/windows-mvp.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MVP (${{ matrix.runtime }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore JellyTranslate.Windows/JellyTranslate.Windows.csproj

      - name: Build
        run: dotnet build JellyTranslate.Windows/JellyTranslate.Windows.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish JellyTranslate.Windows/JellyTranslate.Windows.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true --output artifacts/JellyTranslate-Windows-MVP-${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyTranslate-Windows-MVP-${{ matrix.runtime }}
          path: artifacts/JellyTranslate-Windows-MVP-${{ matrix.runtime }}
          if-no-files-found: error

  publish-release-assets:
    name: Publish Windows release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Package release zips
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for runtime in win-x64 win-arm64; do
            source_dir="downloaded-artifacts/JellyTranslate-Windows-MVP-${runtime}"

            case "$runtime" in
              win-x64)
                output="JellyTranslate-0.1.0-alpha-windows-x64.zip"
                ;;
              win-arm64)
                output="JellyTranslate-0.1.0-alpha-windows-arm64.zip"
                ;;
            esac

            (cd "$source_dir" && zip -r "../../release-assets/$output" .)
          done

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.0-alpha release-assets/*.zip --clobber --repo jellyfishhoner/JellyTranslate
