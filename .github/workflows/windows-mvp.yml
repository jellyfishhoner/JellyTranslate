name: Windows MVP Build

on:
  push:
    paths:
      - "JellyTranslate.Windows/**"
      - ".github/workflows/windows-mvp.yml"
  pull_request:
    paths:
      - "JellyTranslate.Windows/**"
      - ".github/workflows/windows-mvp.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MVP (${{ matrix.runtime }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore JellyTranslate.Windows/JellyTranslate.Windows.csproj

      - name: Build
        run: dotnet build JellyTranslate.Windows/JellyTranslate.Windows.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish JellyTranslate.Windows/JellyTranslate.Windows.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true --output artifacts/JellyTranslate-Windows-MVP-${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyTranslate-Windows-MVP-${{ matrix.runtime }}
          path: artifacts/JellyTranslate-Windows-MVP-${{ matrix.runtime }}
          if-no-files-found: error
