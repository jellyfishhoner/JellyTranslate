[build]
  base = "site"
  publish = "."

[[redirects]]
  from = "/mac"
  to = "/mac.html"
  status = 200

[[redirects]]
  from = "/windows"
  to = "/windows.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
